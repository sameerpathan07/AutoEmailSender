spring.application.name=coldmail

# ---- MySQL ----
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}?sslmode=require
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ---- Gmail SMTP ----
# Use a Gmail "App Password", NOT your normal Gmail password.
# Generate one at: https://myaccount.google.com/apppasswords
# (Requires 2-Step Verification to be enabled on the Google account first.)
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
spring.mail.properties.mail.smtp.starttls.required=true

server.port=${PORT:8080}

# ---- File upload limits (resume PDFs, excel files) ----
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ---- Cold mail sending rules ----
# Stay comfortably under Gmail's ~500/day cap. Shared between fresh sends and follow-ups.
coldmail.daily-limit=450
# How many days to wait after the first email before auto-sending a follow-up.
coldmail.followup-after-days=4
# When the automatic follow-up job runs each day (cron: sec min hour day month weekday).
coldmail.followup-cron=0 0 10 * * *

server.port=8080
